<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HEX // TERMINAL</title>
    <style>
        :root {
            --bg: #050505;
            --line: rgba(0, 255, 255, 0.03);
            --accent: #0ff; 
            --text-main: #fff;
            --text-dim: #444;
            --font-mono: "Fira Code", "Cascadia Code", "Courier New", monospace;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: var(--font-mono);
            margin: 0;
            min-height: 100vh;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--accent);
            background: rgba(0,0,0,0.9);
            position: sticky; top: 0; z-index: 100;
        }
        
        header h1 {
            font-size: 20px;
            letter-spacing: 0.3em;
            color: var(--accent);
            margin: 0;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }

        .section { margin-bottom: 50px; }
        
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--accent);
            margin-bottom: 25px;
            display: flex; align-items: center;
            opacity: 0.8;
        }
        .section-title::before {
            content: "";
            width: 4px; height: 12px;
            background: var(--accent);
            margin-right: 12px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }
        
        .link-item {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            text-decoration: none;
            color: inherit;
            border: 1px solid #1a1a1a;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .link-item:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        
        .link-item:hover .link-title { color: var(--bg); }
        .link-item:hover .link-desc { color: var(--bg); opacity: 0.7; }
        .link-item:hover .link-icon { filter: invert(0); opacity: 1; }

        .link-header { display: flex; align-items: center; }
        
        .link-icon {
            width: 16px; height: 16px;
            margin-right: 12px;
            filter: invert(1); 
            opacity: 0.4;
        }
        
        .link-title { 
            font-size: 15px; 
            font-weight: bold; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .link-desc { 
            font-size: 11px; 
            color: var(--text-dim); 
            margin-top: 8px;
            line-height: 1.4;
            display: block; /* 默认显示，由 JS 控制内容 */
        }

        #loading { font-size: 12px; color: var(--accent); letter-spacing: 2px; }
        
        @media (max-width: 600px) {
            header { padding: 0 20px; }
            .container { padding: 20px; }
            .links-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header><h1>HEX // INDEX</h1></header>
    <div class="container" id="main">
        <div id="loading">:: INITIALIZING_SYSTEM...</div>
    </div>

    <script>
        async function loadLinks() {
            const main = document.getElementById('main');
            try {
                // 加时间戳防止浏览器缓存 data.json
                const response = await fetch('./data.json?v=' + Date.now());
                const data = await response.json();
                document.getElementById('loading').remove();
                
                for (let cat in data) {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    
                    const linksHtml = data[cat].map(i => {
                        // 【逻辑判断】如果描述是“暂无描述”或为空，则不生成描述 HTML
                        const hasDesc = i.desc && i.desc !== "暂无描述" && i.desc.trim() !== "";
                        const descHtml = hasDesc ? `<div class="link-desc">${i.desc}</div>` : "";
                        
                        return `
                            <a href="${i.url}" class="link-item" target="_blank">
                                <div class="link-header">
                                    <img src="${i.icon}" class="link-icon" onerror="this.style.opacity=0">
                                    <span class="link-title">${i.title}</span>
                                </div>
                                ${descHtml}
                            </a>`;
                    }).join('');

                    sec.innerHTML = `
                        <div class="section-title">${cat}</div>
                        <div class="links-grid">${linksHtml}</div>`;
                    main.appendChild(sec);
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = '<span style="color:#f00">:: SYSTEM_ERROR: DATA_LOAD_FAILED</span>';
            }
        }
        loadLinks();
    </script>
</body>
</html>
