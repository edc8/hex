<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HEX / READ.ME</title>
    <style>
        :root {
            --bg: #fff; /* 干净的白底 */
            --text-main: #24292e; /* 类似 GitHub 的深灰文本 */
            --text-link: #0366d6; /* 经典链接蓝 */
            --text-dim: #6a737d;
            --border: #e1e4e8;
            --code-bg: #f6f8fa;
            --font-mono: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            margin: 0;
            padding: 40px 20px 100px;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container { max-width: 760px; margin: 0 auto; }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 0;
            font-family: var(--font-mono); /* 标题用等宽，增加技术感 */
        }
        header h1::before { content: "# "; color: var(--text-dim); } /* 模拟 Markdown H1 */

        .section { margin-bottom: 40px; }
        
        .section-content h2 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 20px 0;
            padding-bottom: 7px;
            border-bottom: 1px solid var(--border);
        }
        .section-content h2::before { content: "## "; color: var(--text-dim); }

        .links-list { display: flex; flex-direction: column; gap: 15px; padding-left: 20px; }
        
        .link-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: flex-start;
        }
        
        .link-marker {
            color: var(--text-dim);
            margin-right: 10px;
            font-family: var(--font-mono);
            user-select: none;
            padding-top: 2px;
        }

        .link-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-link); /* 只有标题是蓝色的，强调可点击 */
        }
        .link-title:hover { text-decoration: underline; }
        
        .link-desc {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 3px;
            display: block;
        }

        #loading {
            font-family: var(--font-mono);
            color: var(--text-dim);
            background: var(--code-bg);
            padding: 10px;
            border-radius: 3px;
            font-size: 13px;
        }
        
        @media (max-width: 600px) {
            body { padding: 20px 15px 60px; }
            header h1 { font-size: 24px; }
            .section-content h2 { font-size: 20px; }
            .links-list { padding-left: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>HEX_INDEX</h1></header>
        <div id="main">
            <div id="loading">Load data.json...</div>
        </div>
    </div>

    <script>
        async function loadLinks() {
            const main = document.getElementById('main');
            try {
                const response = await fetch('./data.json?v=' + Date.now());
                const data = await response.json();
                document.getElementById('loading').remove();
                
                for (let cat in data) {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    
                    // 将图标去掉，统一使用无序列表符号
                    let linksHtml = data[cat].map(i => `
                        <div class="link-item">
                            <span class="link-marker">-</span>
                            <div class="link-content">
                                <a href="${i.url}" class="link-title" target="_blank">${i.title}</a>
                                <span class="link-desc">${i.desc}</span>
                            </div>
                        </div>`).join('');

                    sec.innerHTML = `
                        <div class="section-content">
                            <h2>${cat}</h2>
                            <div class="links-list">
                                ${linksHtml}
                            </div>
                        </div>`;
                    main.appendChild(sec);
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = '<span style="color:#cb2431">Error: Failed to load index.</span>';
            }
        }
        loadLinks();
    </script>
</body>
</html>
